<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <h2 id="home-score">0</h2>
                <button onclick="increaseHomeScore(1)">+1</button>
                <button onclick="increaseHomeScore(2)">+2</button>
                <button onclick="increaseHomeScore(3)">+3</button>
            </div>
            <div>
                <h3>AWAY</h3>
                <h2 id="guest-score">0</h2>
                <button onclick="increaseGuestScore(1)">+1</button>
                <button onclick="increaseGuestScore(2)">+2</button>
                <button onclick="increaseGuestScore(3)">+3</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
